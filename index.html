<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scratch Games + Clicker Challenge</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 20px;
  transition: 0.3s;
}

.light-theme {
  background: white;
  color: black;
}

button {
  padding: 10px 15px;
  margin: 5px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}

#clickButton {
  background: lime;
}

#donateBtn {
  background: gold;
  font-weight: bold;
}

#donateBtn:hover {
  transform: scale(1.05);
}

.games a {
  display: block;
  margin: 5px 0;
  color: cyan;
}

.light-theme .games a {
  color: darkblue;
}

input {
  padding: 6px 8px;
  font-size: 16px;
  border-radius: 5px;
  border: 1px solid #888;
}
</style>
</head>
<body>

<h1>🔥 Scratch Games + Clicker Challenge</h1>

<button onclick="toggleTheme()">🌙 Toggle Theme</button>

<hr>

<h2>🎮 My Scratch Projects</h2>
<div class="games">
  <a href="https://scratch.mit.edu/projects/1266117577/" target="_blank">dodge from a ball</a>
  <a href="https://scratch.mit.edu/projects/1277330031/" target="_blank">ghoul want eeeeat</a>
</div>

<hr>

<h2>Clicks: <span id="clickCount">0</span></h2>
<button id="clickButton">Click Me!</button>

<br><br>

<input id="playerName" placeholder="Enter your name" maxlength="15">
<button onclick="saveScore()">💾 Save Score</button>

<h2>🏆 Global Top 5</h2>
<ol id="leaderboard"></ol>

<br>

<a href="https://send.monobank.ua/jar/4BZo5dCw6Z" target="_blank">
  <button id="donateBtn">💛 Support the Project</button>
</a>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ===== Firebase Config =====
const firebaseConfig = {
  apiKey: "AIzaSyATCCc_waIdUupeRVla1VGA8koZKLEC9GY",
  authDomain: "scratychgaaming.firebaseapp.com",
  projectId: "scratychgaaming",
  storageBucket: "scratychgaaming.firebasestorage.app",
  messagingSenderId: "125051495935",
  appId: "1:125051495935:web:52140518674ece65dd73ca",
  measurementId: "G-JQ9YZSBNS2"
};

// Инициализация Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== Clicker =====
let count = 0;
const clickCount = document.getElementById("clickCount");
const clickButton = document.getElementById("clickButton");
const colors = ['orange','red','yellow','pink','lime','cyan','magenta'];

clickButton.addEventListener("click", () => {
  count++;
  clickCount.textContent = count;

  const randomColor = colors[Math.floor(Math.random() * colors.length)];
  clickButton.style.backgroundColor = randomColor;

  setTimeout(() => clickButton.style.backgroundColor = "lime", 300);
});

// ===== Theme Toggle =====
function toggleTheme() {
  document.body.classList.toggle("light-theme");
}

// ===== Save Score =====
async function saveScore() {
  const name = document.getElementById("playerName").value.trim();
  if (!name) { alert("Enter your name!"); return; }

  try {
    await db.collection("leaderboard").add({
      name: name,
      score: count,
      created: firebase.firestore.FieldValue.serverTimestamp()
    });
    alert("Score saved!");
    count = 0;
    clickCount.textContent = 0;
    loadLeaderboard();
  } catch(err) {
    alert("Error saving: " + err);
  }
}

// ===== Load Leaderboard =====
async function loadLeaderboard() {
  const list = document.getElementById("leaderboard");
  list.innerHTML = "Loading...";

  const snapshot = await db.collection("leaderboard")
    .orderBy("score","desc")
    .limit(5)
    .get();

  list.innerHTML = "";
  snapshot.forEach(doc => {
    const data = doc.data();
    const li = document.createElement("li");
    li.textContent = data.name + " — " + data.score;
    list.appendChild(li);
  });
}

// Load leaderboard on start
loadLeaderboard();
</script>

</body>
</html>
